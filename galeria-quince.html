<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<title>Galería Quinceañeras — matirath.jpg</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root { --blk:#0a0908; --blk2:#111009; --cream:#e8e1d5; --cream2:#f0ebe2; --gold:#b08c18; --gutter:3rem; --R:"Rubik",sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--R);background:var(--blk);color:#f2ede6;line-height:1.6;overflow-x:hidden;}
  .hero{min-height:65vh;min-height:clamp(560px,65vh,760px);position:relative;overflow:hidden;background:linear-gradient(135deg,#0a0908 0%,#1a1200 50%,#0a0908 100%);}
  .hero-grad{position:absolute;inset:0;z-index:0;overflow:hidden;filter:url(#goo) blur(40px);}
  .hero-overlay{position:absolute;inset:0;z-index:1;background:#0a0908;opacity:.45;pointer-events:none;transition:opacity .05s linear;}
  .page{max-width:1120px;margin:0 auto;padding:2.2rem 1.5rem;position:relative;z-index:2;}

  .back{display:inline-flex;align-items:center;gap:.4rem;color:var(--cream);text-decoration:none;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:.7rem;margin-bottom:1.5rem;}
  .back:hover{color:var(--gold);}
  h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:900;line-height:1.1;margin-bottom:.8rem;letter-spacing:-.02em;}
  .note{margin-bottom:1.2rem;color:rgba(242,237,230,.72);max-width:72ch;}
  .gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;}
  .gallery img{width:100%;height:auto;aspect-ratio:3/4;object-fit:cover;border-radius:14px;border:1px solid rgba(176,140,24,.2);box-shadow:0 12px 24px rgba(0,0,0,.4);cursor:zoom-in;transition:transform .3s ease,box-shadow .3s ease;}
  .gallery img:nth-child(4){aspect-ratio:16/9;grid-column:span 2;}
  .gallery img:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 16px 30px rgba(0,0,0,.5);}
  .gallery img:active{transform:scale(.99);}
  .hero-bar{height:2px;margin-bottom:1.6rem;background:linear-gradient(90deg,var(--gold),rgba(176,140,24,0));}
  .hero-grad{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;filter:url(#goo) blur(40px);}
  .hg-blob{position:absolute;border-radius:50%;mix-blend-mode:hard-light;opacity:.9;}
  .s-dark{background:var(--blk);color:#f2ede6;position:relative;}
  footer.s-dark{padding:3rem var(--gutter);display:grid;grid-template-columns:1fr auto 1fr;gap:2rem;align-items:center;border-top:1px solid rgba(176,140,24,.1);background:var(--blk);}
  .fl{display:flex;align-items:center;gap:.8rem;}
  .ph-logo{width:40px;height:40px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.65rem;color:#0a0908;}
  .ph-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
  .ph-logo-sm{width:32px;height:32px;font-size:.55rem;}
  .fm{font-size:.7rem;font-weight:600;letter-spacing:.08em;color:#f2ede6;}
  .fh{font-size:.65rem;color:rgba(242,237,230,.6);letter-spacing:.08em;}
  .fc{font-size:.6rem;color:rgba(242,237,230,.5);text-align:right;}
  .back-top{position:fixed;bottom:2rem;right:var(--gutter);z-index:190;width:40px;height:40px;background:rgba(176,140,24,.1);border:1px solid rgba(176,140,24,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:all .3s;outline:none;}
  .back-top.visible{opacity:1;pointer-events:auto;}
  .back-top:hover{background:rgba(176,140,24,.2);border-color:var(--gold);}
  .back-top-arr{display:block;font-size:1rem;color:var(--gold);}
  @media(hover:hover){
    body{cursor:none}
    #cur{width:7px;height:7px;background:var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .18s,height .18s}
    #cur-r{width:26px;height:26px;border:1px solid rgba(176,140,24,.3);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}
  }
  .hg2{width:90%;height:90%;top:-25%;left:5%;background:radial-gradient(circle at center,rgba(176,140,24,.45) 0%,rgba(176,140,24,0) 60%);animation:bMC 30s linear infinite;}
  .hg3{width:110%;height:110%;top:-20%;left:-20%;background:radial-gradient(circle at center,rgba(255,220,130,.32) 0%,rgba(255,220,130,0) 60%);animation:bMC 40s linear infinite;}
  @keyframes bMC{0%{transform:rotate(0deg)}50%{transform:rotate(180deg)}100%{transform:rotate(360deg)}}
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
  .lightbox.active{display:flex}
  .lightbox-content{position:relative;width:90%;max-width:900px;max-height:90vh;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:8px;}
  .lightbox-img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:8px;transition:transform .1s ease-out;cursor:zoom-in;}
  .lightbox-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(176,140,24,.7);border:none;color:#fff;width:48px;height:48px;border-radius:50%;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:9001;}
  .lightbox-btn:hover{background:rgba(176,140,24,1);transform:translateY(-50%) scale(1.1);}
  .lightbox-btn.prev{left:20px}
  .lightbox-btn.next{right:20px}
  .lightbox-close{position:absolute;top:20px;right:20px;background:rgba(176,140,24,.7);border:none;color:#fff;width:48px;height:48px;border-radius:50%;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:9002;}
  .lightbox-close:hover{background:rgba(176,140,24,1)}
  .lightbox-counter{position:absolute;bottom:20px;right:40px;color:transparent;font-size:4rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;-webkit-text-stroke:1px #fff;line-height:1;}

</style>
</head>
<body>
  <section class="hero s-dark">
    <div class="hero-grad">
      <div class="hg-blob hg2"></div>
      <div class="hg-blob hg3"></div>
    </div>
    <div class="hero-overlay"></div>
    <div class="page">
      <svg class="hero-svg-filter"><filter id="goo"><feGaussianBlur in="SourceGraphic" stdDeviation="10" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></svg>
      <a class="back" href="eventos.html">← Volver a Eventos</a>
    <div class="hero-bar"></div>
    <h1>Galería de Quinceañeras</h1>
    <p class="note">Tocá o hacé click en cada imagen para verla con más detalle (o mantené clic para descargar).</p>
    <div class="gallery">
      <img src="imgs/quince1.jpg" alt="Quinceañera 1" />
      <img src="imgs/quince2.jpg" alt="Quinceañera 2" />
      <img src="imgs/quince3.jpg" alt="Quinceañera 3" />
      <img src="imgs/quince4.jpg" alt="Quinceañera 4" />
      <img src="imgs/quince5.jpg" alt="Quinceañera 5" />
      <img src="imgs/quince6.jpg" alt="Quinceañera 6" />
      <img src="imgs/quince7.jpg" alt="Quinceañera 7" />
      <img src="imgs/quince8.jpg" alt="Quinceañera 8" />
    </div>
  </div>
  </section>

  <footer class="s-dark">
    <div class="fl"><div class="ph-logo ph-logo-sm"><img src="imgs/LOGOMATIRATH.png" alt="Logo Matirath"></div><span class="fm">matirath.jpg</span></div>
    <span class="fh">@matirath.jpg</span>
    <span class="fc">© <span id="yr"></span> Matías Rath · Argentina</span>
  </footer>

  <div id="cur"></div><div id="cur-r"></div>

  <div id="lightbox" class="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Cerrar">✕</button>
    <button class="lightbox-btn prev" onclick="prevImage()" aria-label="Anterior">‹</button>
    <div class="lightbox-content">
      <img id="lightbox-img" class="lightbox-img" src="" alt="">
    </div>
    <button class="lightbox-btn next" onclick="nextImage()" aria-label="Siguiente">›</button>
    <div class="lightbox-counter"><span id="current-idx">1</span> / <span id="total-imgs">0</span></div>
  </div>

  <script>
    var yr=document.getElementById('yr'); if(yr) yr.textContent=new Date().getFullYear();
    var cur=document.getElementById('cur'), ring=document.getElementById('cur-r');
    if(cur){
      var mx=0,my=0,rx=0,ry=0;
      document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
      (function loop(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1; if(ring){ring.style.left=rx+'px';ring.style.top=ry+'px'} requestAnimationFrame(loop)})();
      document.querySelectorAll('a,button,.gallery img').forEach(function(el){
        el.addEventListener('mouseenter',function(){cur.style.width='13px';cur.style.height='13px'});
        el.addEventListener('mouseleave',function(){cur.style.width='7px';cur.style.height='7px'});
      });
    }
    
    var currentIdx=0, images=[], lightbox=document.getElementById('lightbox');
    document.querySelectorAll('.gallery img').forEach(function(img, idx){
      images.push(img.src);
      img.addEventListener('click',function(){openLightbox(idx)});
    });
    document.getElementById('total-imgs').textContent=images.length;
    
    function openLightbox(idx){
      currentIdx=idx;
      document.getElementById('lightbox-img').src=images[idx];
      document.getElementById('current-idx').textContent=idx+1;
      lightbox.classList.add('active');
      document.body.style.overflow='hidden';
    }
    function closeLightbox(){
      lightbox.classList.remove('active');
      document.body.style.overflow='auto';
    }
    function nextImage(){
      currentIdx=(currentIdx+1)%images.length;
      openLightbox(currentIdx);
    }
    function prevImage(){
      currentIdx=(currentIdx-1+images.length)%images.length;
      openLightbox(currentIdx);
    }
    document.addEventListener('keydown',function(e){
      if(!lightbox.classList.contains('active'))return;
      if(e.key==='ArrowRight')nextImage();
      if(e.key==='ArrowLeft')prevImage();
      if(e.key==='Escape')closeLightbox();
    });
    lightbox.addEventListener('click',function(e){
      if(e.target===lightbox)closeLightbox();
    });
    
    var lightboxImg=document.getElementById('lightbox-img'), lightboxContent=document.querySelector('.lightbox-content');
    var isZoomed=false;
    lightboxImg.addEventListener('click',function(e){
      e.stopPropagation();
      isZoomed=!isZoomed;
      if(!isZoomed){
        lightboxImg.style.transform='scale(1)';
        lightboxImg.style.transformOrigin='center center';
      }
    });
    lightboxImg.addEventListener('mousemove',function(e){
      if(!isZoomed)return;
      var rect=lightboxImg.getBoundingClientRect();
      var x=(e.clientX-rect.left)/rect.width*100;
      var y=(e.clientY-rect.top)/rect.height*100;
      lightboxImg.style.transformOrigin=x+'% '+y+'%';
      lightboxImg.style.transform='scale(1.5)';
    });
    lightboxImg.addEventListener('mouseleave',function(){
      if(isZoomed){
        lightboxImg.style.transformOrigin='center center';
        lightboxImg.style.transform='scale(1.5)';
      }
    });
  </script>
</body>
</html>
